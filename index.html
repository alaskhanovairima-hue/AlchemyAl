<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chem Reaction Engine PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
font-family:Arial;
color:white;

/* ФОНОВАЯ КАРТИНКА */
background:url("https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
}

/* затемнение */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* canvas молекулы */
canvas{
position:fixed;
top:0;left:0;
z-index:1;
}

/* интерфейс */
.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:20px;
text-shadow:0 0 15px cyan;
}

input{
width:70%;
padding:15px;
border-radius:12px;
border:none;
font-size:16px;
outline:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#00d4ff;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#0088ff;
}

.result{
margin-top:20px;
max-width:900px;
max-height:55vh;
overflow:auto;
padding:20px;
background:rgba(0,0,0,0.5);
border-radius:15px;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* взрыв */
.boom{
position:fixed;
width:10px;height:10px;
border-radius:50%;
background:yellow;
animation:explode 1s forwards;
z-index:999;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(25);opacity:0;}
}
</style>
</head>

<body>

<div class="overlay"></div>
<canvas id="molecules"></canvas>

<div class="container">
<h1>⚗ CHEMICAL REACTION ENGINE PRO</h1>

<input id="eq" placeholder="Например: K2O + H2O">
<button onclick="solve()">Запустить реакцию</button>

<div class="result" id="res"></div>
</div>

<script>

/* ---------- MOLECULE ANIMATION ---------- */
const canvas=document.getElementById("molecules");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mols=[];

for(let i=0;i<60;i++){
mols.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+2,
vx:(Math.random()-0.5)*1.2,
vy:(Math.random()-0.5)*1.2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let m of mols){
ctx.beginPath();
ctx.fillStyle="rgba(0,255,255,0.7)";
ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
ctx.fill();

m.x+=m.vx;
m.y+=m.vy;

if(m.x<0||m.x>canvas.width)m.vx*=-1;
if(m.y<0||m.y>canvas.height)m.vy*=-1;
}

requestAnimationFrame(draw);
}
draw();

/* ---------- DATABASE ---------- */
const reactions=[
{
r:["K2O","H2O"],
p:"2KOH",
desc:"Оксид калия реагирует с водой → образуется щёлочь.",
use:"Используется для получения щёлочей в промышленности.",
danger:"Очень реакционноспособно, вызывает ожоги кожи."
},
{
r:["Na","H2O"],
p:"NaOH + H2",
desc:"Натрий бурно реагирует с водой.",
use:"Используется в химическом синтезе.",
danger:"Взрывопожароопасная реакция."
},
{
r:["HCl","NaOH"],
p:"NaCl + H2O",
desc:"Нейтрализация кислоты и основания.",
use:"Медицина, фармацевтика.",
danger:"Безопасная при контроле."
},
{
r:["CaCO3","HCl"],
p:"CaCl2 + CO2 + H2O",
desc:"Выделяется углекислый газ.",
use:"Лабораторное получение CO2.",
danger:"Выделение газа может быть опасно в закрытых пространствах."
},
{
r:["Fe","O2"],
p:"Fe2O3",
desc:"Окисление железа (ржавление).",
use:"Металлургия, антикоррозийные исследования.",
danger:"Разрушение металлоконструкций."
}
];

/* ---------- PARSE ---------- */
function norm(x){
return x.split("+").map(i=>i.trim());
}

/* ---------- EXPLOSION ---------- */
function boom(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="boom";
d.style.left=Math.random()*window.innerWidth+"px";
d.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

/* ---------- MAIN ---------- */
function solve(){
let input=document.getElementById("eq").value;
let left=norm(input);

for(let r of reactions){
if(JSON.stringify(r.r.sort())===JSON.stringify(left.sort())){
document.getElementById("res").innerHTML=`
<b>⚗ Продукты:</b> ${r.p}<br><br>
📘 <b>Описание:</b> ${r.desc}<br><br>
⚙ <b>Применение:</b> ${r.use}<br><br>
☠ <b>Опасность:</b> ${r.danger}
`;
boom();
return;
}
}

document.getElementById("res").innerHTML="❌ Реакция не найдена в базе";
}

</script>

</body>
</html>
